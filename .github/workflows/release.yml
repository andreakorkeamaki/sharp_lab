name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-python-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[release]
          python -m build

      - name: Upload python packages
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*

  build-standalone:
    needs: build-python-packages
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_slug: macos
          - os: windows-latest
            platform_slug: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build standalone executable
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[release]
          if [ ! -d runtime ]; then
            python scripts/build_ml_sharp_runtime.py --runtime-dir runtime
          fi
          pyinstaller sharp_lab.spec --noconfirm --clean

      - name: Archive standalone build
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PLATFORM_SLUG: ${{ matrix.platform_slug }}
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          import zipfile
          from pathlib import Path

          dist_dir = Path("dist")
          executable_name = "Sharp Lab.exe" if (dist_dir / "Sharp Lab.exe").exists() else "Sharp Lab"
          source = dist_dir / executable_name
          runtime_dir = Path("runtime")
          platform_slug = os.environ["PLATFORM_SLUG"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          ref_type = os.environ["GITHUB_REF_TYPE"]
          repository = os.environ["GITHUB_REPOSITORY"]

          full_asset_name = f"sharp-lab-{platform_slug}-{ref_name}"
          lite_asset_name = f"sharp-lab-{platform_slug}-lite-{ref_name}"
          runtime_asset_name = f"sharp-lab-runtime-{platform_slug}-{ref_name}"
          runtime_download_url = None
          if ref_type == "tag":
              runtime_download_url = f"https://github.com/{repository}/releases/download/{ref_name}/{runtime_asset_name}.zip"

          def write_manifest(root: Path, build_flavor: str) -> None:
              runtime_install_mode = "archive"
              runtime_archive = runtime_download_url
              python_nuget_url = None
              if build_flavor == "lite" and platform_slug == "windows":
                  runtime_install_mode = "windows-local"
                  runtime_archive = None
                  python_nuget_url = "https://aka.ms/nugetclidl"
              payload = {
                  "build_flavor": build_flavor,
                  "runtime_install_mode": runtime_install_mode,
                  "runtime_archive_url": runtime_archive,
                  "python_nuget_url": python_nuget_url,
                  "python_package": "python",
                  "python_version": "3.11.9",
                  "sharp_source_url": "https://github.com/apple/ml-sharp/archive/1eaa046834b81852261262b41b0919f5c1efdd2e.zip",
                  "sharp_repo_url": "https://github.com/apple/ml-sharp.git",
                  "sharp_repo_ref": "1eaa046834b81852261262b41b0919f5c1efdd2e",
                  "model_url": "https://ml-site.cdn-apple.com/models/sharp/sharp_2572gikvuh.pt",
                  "studio_path": "/studio",
                  "setup_path": "/setup",
              }
              (root / "sharp_lab.release.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")

          def populate_common_files(root: Path) -> None:
              root.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, root / source.name)
              for filename in ("README.md", "sharp_lab.example.json"):
                  path = Path(filename)
                  if path.exists():
                      shutil.copy2(path, root / path.name)

          def make_archive(asset_name: str, include_runtime: bool, build_flavor: str) -> None:
              release_root = dist_dir / asset_name
              archive = dist_dir / f"{asset_name}.zip"
              if release_root.exists():
                  shutil.rmtree(release_root)
              populate_common_files(release_root)
              if include_runtime and runtime_dir.exists():
                  shutil.copytree(runtime_dir, release_root / "runtime")
              write_manifest(release_root, build_flavor)

              with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as handle:
                  for path in release_root.rglob("*"):
                      if path.is_file():
                          handle.write(path, arcname=path.relative_to(dist_dir))
              print(f"created {archive}")

          make_archive(full_asset_name, include_runtime=True, build_flavor="full")
          make_archive(lite_asset_name, include_runtime=False, build_flavor="lite")

          runtime_root = dist_dir / runtime_asset_name
          runtime_archive = dist_dir / f"{runtime_asset_name}.zip"
          if runtime_root.exists():
              shutil.rmtree(runtime_root)
          runtime_root.mkdir(parents=True)
          if runtime_dir.exists():
              shutil.copytree(runtime_dir, runtime_root / "runtime")
          with zipfile.ZipFile(runtime_archive, "w", compression=zipfile.ZIP_DEFLATED) as handle:
              for path in runtime_root.rglob("*"):
                  if path.is_file():
                      handle.write(path, arcname=path.relative_to(runtime_root))
          print(f"created {runtime_archive}")
          PY

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharp-lab-${{ matrix.platform_slug }}-bundles
          path: |
            dist/sharp-lab-${{ matrix.platform_slug }}-${{ github.ref_name }}.zip
            dist/sharp-lab-${{ matrix.platform_slug }}-lite-${{ github.ref_name }}.zip
            dist/sharp-lab-runtime-${{ matrix.platform_slug }}-${{ github.ref_name }}.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-python-packages
      - build-standalone
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/python-packages/*
            release-artifacts/sharp-lab-macos-bundles/*
            release-artifacts/sharp-lab-windows-bundles/*
